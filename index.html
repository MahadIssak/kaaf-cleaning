<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaaf Cleaning Services</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #007BFF; /* Blue */
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
        h1, h2 {
            color: #28A745; /* Green */
        }
        .services, .benefits {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        /* Responsive layout */
        @media (max-width: 600px) {
            header {
                font-size: 18px;
            }
            .container {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Kaaf Cleaning Services</h1>
    </header>
    <div class="container">
        <h2>Our Services</h2>
        <div class="services">
            <ul>
                <li>Residential Cleaning</li>
                <li>Commercial Cleaning</li>
                <li>Deep Cleaning</li>
                <li>Move-In/Out Cleaning</li>
            </ul>
        </div>
        <h2>Benefits of Choosing Us</h2>
        <div class="benefits">
            <ul>
                <li>Professional and experienced staff</li>
                <li>Eco-friendly products</li>
                <li>Flexible scheduling</li>
                <li>100% satisfaction guarantee</li>
            </ul>
        </div>
    </div>
</body>
</html>
